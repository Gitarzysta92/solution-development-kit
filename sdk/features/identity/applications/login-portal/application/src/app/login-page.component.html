<main class="container">
  <section class="card">
    <h1>Sign in</h1>
    <p class="subtitle">Use your platform account to continue.</p>

    <form [formGroup]="form" (ngSubmit)="loginWithEmailPassword()">
      <label>
        Email
        <input type="email" formControlName="email" autocomplete="email" />
      </label>

      <label>
        Password
        <input
          type="password"
          formControlName="password"
          autocomplete="current-password"
        />
      </label>

      <button type="submit" [disabled]="pending()">Sign in</button>
    </form>

    <div class="divider">or</div>

    <button class="google" type="button" (click)="loginWithGoogle()" [disabled]="pending()">
      Continue with Google
    </button>

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }
  </section>
</main>
