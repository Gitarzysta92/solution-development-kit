replicaCount: 2

image:
  repository: solution-development-kit-images.nexus.dev.threesixty.dev/features/identity/authenticator
  pullPolicy: Always
  tag: latest

imagePullSecrets:
  - name: nexus-pull-secret

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
  hosts:
    - host: authenticator.host.placeholder
      paths:
        - path: /
          pathType: Prefix

env:
  - name: PORT
    value: "8080"
  - name: FIREBASE_PROJECT_ID
    valueFrom:
      secretKeyRef:
        name: firebase-config
        key: project-id
  - name: FIREBASE_WEB_API_KEY
    valueFrom:
      secretKeyRef:
        name: firebase-config
        key: web-api-key
        optional: true
  - name: ENABLE_GOOGLE
    value: "true"
  - name: GOOGLE_CLIENT_ID
    valueFrom:
      secretKeyRef:
        name: firebase-config
        key: google-client-id
        optional: true
  - name: GOOGLE_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: firebase-config
        key: google-client-secret
        optional: true
  - name: INGRESS_AUTH_SECRET
    valueFrom:
      secretKeyRef:
        name: ingress-auth-secret
        key: secret
        optional: true
  - name: AUTH_COOKIE_NAMES
    value: "auth_token"
  - name: GOOGLE_APPLICATION_CREDENTIALS
    value: "/var/secrets/firebase/serviceAccount.json"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

volumeMounts:
  - name: firebase-admin-credentials
    mountPath: /var/secrets/firebase
    readOnly: true

volumes:
  - name: firebase-admin-credentials
    secret:
      secretName: firebase-admin-credentials
      optional: true

probes:
  path: /health
  port: 8080
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 10
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5

