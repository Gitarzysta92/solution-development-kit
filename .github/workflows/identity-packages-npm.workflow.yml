name: 'Identity Packages - Publish npm'

on:
  push:
    branches: [main]
    paths:
      - 'sdk/features/identity/packages/**'
      - '.github/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (defaults to 0.1.<run_number>)'
        required: false
        type: string

jobs:
  publish:
    name: Publish identity packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@gitarzysta92'

      - name: Install dependencies
        run: npm ci

      - name: Resolve publish version
        id: v
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.1.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build packages
        run: |
          npx nx build sdk-identity-infrastructure-firebase
          npx nx build sdk-identity-infrastructure-opa

      - name: Publish firebase package
        uses: ./.github/actions/publish-npm-dist
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          dist_dir: dist/sdk/features/identity/packages/infrastructure/firebase
          source_manifest: sdk/features/identity/packages/infrastructure/firebase/package.json
          version: ${{ steps.v.outputs.version }}

      - name: Publish opa package
        uses: ./.github/actions/publish-npm-dist
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          dist_dir: dist/sdk/features/identity/packages/infrastructure/opa
          source_manifest: sdk/features/identity/packages/infrastructure/opa/package.json
          version: ${{ steps.v.outputs.version }}

