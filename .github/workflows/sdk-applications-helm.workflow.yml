name: 'SDK Applications - Build Image & Publish Helm'

on:
  push:
    branches: [main, develop]
    paths:
      - 'sdk/features/discussion/applications/**'
      - 'sdk/features/identity/applications/**'
      - 'sdk/features/**/provisioning/helm/**'
      - '.github/**'
  workflow_dispatch: {}

jobs:
  detect_changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed_apps_json: ${{ steps.compute.outputs.changed_apps_json }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect paths
        id: changes
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: dorny/paths-filter@v3
        with:
          filters: |
            discussion:
              - 'sdk/features/discussion/applications/management/**'
            discussion_materializer:
              - 'sdk/features/discussion/applications/materializer/**'
            authenticator:
              - 'sdk/features/identity/applications/authenticator/**'
            account_management:
              - 'sdk/features/identity/applications/management/**'
            login_portal:
              - 'sdk/features/identity/applications/login-portal/**'
            shared:
              - 'sdk/kernel/**'
              - 'sdk/features/**/libs/**'
              - 'package.json'
              - 'package-lock.json'
              - 'nx.json'
              - 'tsconfig.base.json'
              - '.github/actions/**'
              - '.github/workflows/sdk-applications-helm.workflow.yml'

      - name: Compute changed app matrix
        id: compute
        shell: bash
        run: |
          set -euo pipefail

          ALL_APPS='["discussion","discussion-materializer","authenticator","account-management","login-portal"]'

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed_apps_json=${ALL_APPS}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SHARED_CHANGED="${{ steps.changes.outputs.shared }}"
          if [ "${SHARED_CHANGED}" = "true" ]; then
            echo "changed_apps_json=${ALL_APPS}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_APPS_JSON="["
          SEP=""

          if [ "${{ steps.changes.outputs.discussion }}" = "true" ]; then
            CHANGED_APPS_JSON="${CHANGED_APPS_JSON}${SEP}\"discussion\""
            SEP=","
          fi
          if [ "${{ steps.changes.outputs.discussion_materializer }}" = "true" ]; then
            CHANGED_APPS_JSON="${CHANGED_APPS_JSON}${SEP}\"discussion-materializer\""
            SEP=","
          fi
          if [ "${{ steps.changes.outputs.authenticator }}" = "true" ]; then
            CHANGED_APPS_JSON="${CHANGED_APPS_JSON}${SEP}\"authenticator\""
            SEP=","
          fi
          if [ "${{ steps.changes.outputs.account_management }}" = "true" ]; then
            CHANGED_APPS_JSON="${CHANGED_APPS_JSON}${SEP}\"account-management\""
            SEP=","
          fi
          if [ "${{ steps.changes.outputs.login_portal }}" = "true" ]; then
            CHANGED_APPS_JSON="${CHANGED_APPS_JSON}${SEP}\"login-portal\""
          fi

          CHANGED_APPS_JSON="${CHANGED_APPS_JSON}]"
          echo "changed_apps_json=${CHANGED_APPS_JSON}" >> "$GITHUB_OUTPUT"

  # Requires repo-level variables NEXUS_DOCKER_HOST, NEXUS_DOCKER_REGISTRY, NEXUS_HELM_REPOSITORY_URL and secrets NEXUS_USERNAME, NEXUS_PASSWORD. See .github/SECRETS.md.
  # Uses ARC runner scale set (solution-development-kit) for image build/push.
  build_publish:
    name: Build & publish (${{ matrix.app }})
    needs: detect_changes
    runs-on: arc-runner-set-solution-development-kit
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        app: ${{ fromJson(needs.detect_changes.outputs.changed_apps_json) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve application configuration
        id: cfg
        shell: bash
        run: |
          set -euo pipefail

          case "${{ matrix.app }}" in
            discussion)
              echo "image_path=features/discussion/management" >> "$GITHUB_OUTPUT"
              echo "nx_project=sdk-features-discussion-applications-management" >> "$GITHUB_OUTPUT"
              echo "dist_context=dist/sdk/features/discussion/applications/management" >> "$GITHUB_OUTPUT"
              echo "dockerfile=sdk/features/discussion/applications/management/service/Dockerfile" >> "$GITHUB_OUTPUT"
              echo "chart=sdk/features/discussion/applications/management/provisioning/helm/discussion" >> "$GITHUB_OUTPUT"
              ;;
            discussion-materializer)
              echo "image_path=features/discussion/discussion-materializer" >> "$GITHUB_OUTPUT"
              echo "nx_project=sdk-features-discussion-applications-materializer" >> "$GITHUB_OUTPUT"
              echo "dist_context=dist/sdk/features/discussion/applications/materializer" >> "$GITHUB_OUTPUT"
              echo "dockerfile=sdk/features/discussion/applications/materializer/service/Dockerfile" >> "$GITHUB_OUTPUT"
              echo "chart=sdk/features/discussion/applications/materializer/provisioning/helm/discussion-materializer" >> "$GITHUB_OUTPUT"
              ;;
            authenticator)
              echo "image_path=features/identity/authenticator" >> "$GITHUB_OUTPUT"
              echo "nx_project=sdk-features-identity-applications-authenticator" >> "$GITHUB_OUTPUT"
              echo "dist_context=dist/sdk/features/identity/applications/authenticator" >> "$GITHUB_OUTPUT"
              echo "dockerfile=sdk/features/identity/applications/authenticator/service/Dockerfile" >> "$GITHUB_OUTPUT"
              echo "chart=sdk/features/identity/applications/authenticator/provisioning/helm/authenticator" >> "$GITHUB_OUTPUT"
              ;;
            account-management)
              echo "image_path=features/identity/account-management" >> "$GITHUB_OUTPUT"
              echo "nx_project=sdk-features-identity-applications-management" >> "$GITHUB_OUTPUT"
              echo "dist_context=dist/sdk/features/identity/applications/management" >> "$GITHUB_OUTPUT"
              echo "dockerfile=sdk/features/identity/applications/management/service/Dockerfile" >> "$GITHUB_OUTPUT"
              echo "chart=sdk/features/identity/applications/management/provisioning/helm/account-management" >> "$GITHUB_OUTPUT"
              ;;
            login-portal)
              echo "image_path=features/identity/login-portal" >> "$GITHUB_OUTPUT"
              echo "nx_project=sdk-features-identity-applications-login-portal" >> "$GITHUB_OUTPUT"
              echo "dist_context=dist/sdk/features/identity/applications/login-portal/application/browser" >> "$GITHUB_OUTPUT"
              echo "dockerfile=sdk/features/identity/applications/login-portal/application/Dockerfile" >> "$GITHUB_OUTPUT"
              echo "chart=sdk/features/identity/applications/login-portal/provisioning/helm/login-portal" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported app: ${{ matrix.app }}"
              exit 1
              ;;
          esac

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        timeout-minutes: 12
        env:
          NPM_CONFIG_FUND: "false"
        run: npm ci --prefer-offline --no-audit --progress=false

      - name: Build application
        run: npx nx build ${{ steps.cfg.outputs.nx_project }} --configuration=production

      - name: Compute image tags (Nexus)
        id: tags
        shell: bash
        run: |
          IMAGE="${{ vars.NEXUS_DOCKER_REGISTRY }}/${{ steps.cfg.outputs.image_path }}"
          IMAGE="$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "sha_tag=$IMAGE:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "extra_tag=$IMAGE:latest" >> "$GITHUB_OUTPUT"
          else
            echo "extra_tag=$IMAGE:${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Nexus Docker registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.NEXUS_DOCKER_HOST }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}

      - name: Build & push image
        uses: ./.github/actions/build-and-push
        with:
          context: ${{ steps.cfg.outputs.dist_context }}
          dockerfile: ${{ steps.cfg.outputs.dockerfile }}
          tags: |
            ${{ steps.tags.outputs.sha_tag }}
            ${{ steps.tags.outputs.extra_tag }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Preflight Helm chart repository endpoint
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${NEXUS_HELM_REPOSITORY_URL:-}" ]; then
            echo "NEXUS_HELM_REPOSITORY_URL is not set. Configure it in repository Actions variables."
            exit 1
          fi

          REPO_INDEX_URL="${NEXUS_HELM_REPOSITORY_URL%/}/index.yaml"
          echo "Checking Helm repository index ${REPO_INDEX_URL} ..."
          STATUS="$(curl -ksS -o /dev/null -w "%{http_code}" "${REPO_INDEX_URL}" || true)"
          echo "HTTP status: ${STATUS}"

          if [ "${STATUS}" = "000" ]; then
            echo "Warning: Helm repository preflight returned HTTP 000; continuing to upload validation."
          elif [ "${STATUS}" != "200" ] && [ "${STATUS}" != "401" ]; then
            echo "Expected Helm repository index to return 200/401, got ${STATUS}."
            echo "NEXUS_HELM_REPOSITORY_URL likely points to an invalid or inaccessible chart repository."
            exit 1
          fi
        env:
          NEXUS_HELM_REPOSITORY_URL: ${{ vars.NEXUS_HELM_REPOSITORY_URL }}

      - name: Publish Helm chart to Nexus
        id: publish
        uses: ./.github/actions/publish-helm-chart
        with:
          chart_path: ${{ steps.cfg.outputs.chart }}
          repository_url: ${{ vars.NEXUS_HELM_REPOSITORY_URL }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}
          version: 0.1.${{ github.run_number }}
          app_version: ${{ github.sha }}

      - name: Publish summary
        run: |
          echo "### Chart published" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Chart | ${{ matrix.app }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Chart version | 0.1.${{ github.run_number }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| App version | ${{ github.sha }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image registry | \`${{ vars.NEXUS_DOCKER_REGISTRY }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Chart repository | \`${{ vars.NEXUS_HELM_REPOSITORY_URL }}\` |" >> "$GITHUB_STEP_SUMMARY"

