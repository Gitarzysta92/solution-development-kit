name: publish-helm-chart
description: Package and upload a Helm chart to Nexus

inputs:
  chart_path:
    description: Path to chart directory
    required: true
  repository_url:
    description: Nexus Helm repository URL (e.g. https://nexus/repository/solution-development-kit-charts/)
    required: true
  username:
    description: Nexus username
    required: true
  password:
    description: Nexus password or token
    required: true
  version:
    description: Chart version
    required: true
  app_version:
    description: Chart appVersion
    required: true

runs:
  using: composite
  steps:
    - name: Lint chart
      shell: bash
      run: helm lint "${{ inputs.chart_path }}"

    - name: Package chart
      shell: bash
      run: |
        mkdir -p .helm-packages
        helm package "${{ inputs.chart_path }}" \
          --version "${{ inputs.version }}" \
          --app-version "${{ inputs.app_version }}" \
          --destination .helm-packages

    - name: Upload chart package
      shell: bash
      run: |
        pkg="$(ls -1 .helm-packages/*.tgz | head -n 1)"
        repo_url="$(printf '%s' "${{ inputs.repository_url }}" | tr -d '\r' | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//')"

        if [ -z "$repo_url" ]; then
          echo "repository_url input is empty."
          exit 1
        fi

        if [[ ! "$repo_url" =~ ^https?:// ]]; then
          repo_url="https://${repo_url}"
        fi

        upload_url="${repo_url%/}/"
        echo "Uploading chart package to ${upload_url}"

        curl -fsS \
          --user "${{ inputs.username }}:${{ inputs.password }}" \
          --upload-file "$pkg" \
          "${upload_url}"

